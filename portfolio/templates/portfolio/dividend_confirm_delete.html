<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Dividend | EzInvester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">EzInvester</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'asset_list' %}">Assets</a>
                <a class="nav-link text-white" href="{% url 'dividend_list' %}">Dividends</a>
                <span class="nav-link text-white">{{ request.user.username }}</span>
                <a class="nav-link text-white" href="{% url 'logout' %}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm p-4 text-center">
                    <h3 class="mb-3">Delete Dividend</h3>
                    <p>Are you sure you want to delete the dividend of <strong>${{ dividend.value }}</strong> from <strong>{{ dividend.asset.ticker }}</strong>?</p>
                    <p class="text-muted">This action cannot be undone.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-2 justify-content-center mt-3">
                            <button type="submit" class="btn btn-danger">Delete</button>
                            <a href="{% url 'dividend_list' %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

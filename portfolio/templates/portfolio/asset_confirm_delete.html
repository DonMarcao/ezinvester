{% extends 'base.html' %}

{% block title %}Delete Asset | EzInvester{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <h3 class="mb-3">Delete Asset</h3>
            <p class="text-muted">Are you sure you want to delete <strong>{{ asset.ticker }}</strong>?</p>
            <p class="text-muted small">This action cannot be undone.</p>
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center mt-3">
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'asset_list' %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
